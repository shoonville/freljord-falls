name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true          # turn Pages on automatically on first run

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .                    # static site lives at the repo root (index.html + .glb assets)

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
